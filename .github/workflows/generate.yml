name: Generate Go from Proto

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [proto-updated]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Generated Repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-tags: true

      - name: Clone Proto Files Repository
        run: git clone https://github.com/nikalexan/go-protos.git /tmp/proto-source

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Go Code from Proto Files
        run: |
          cd /tmp/proto-source
          protoc \
            --proto_path=. \
            --go_out=$GITHUB_WORKSPACE --go_opt=paths=source_relative \
            --go-grpc_out=$GITHUB_WORKSPACE --go-grpc_opt=paths=source_relative \
            payment/payment.proto \
            order/order.proto

      - name: Commit generated files
        id: commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: regenerate pb.go from protos"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version tag
        id: tag
        if: steps.commit.outputs.changed == 'true'
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -n1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git tag "$NEW_TAG"

      - name: Push commit and tag
        if: steps.commit.outputs.changed == 'true'
        run: |
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nikalexan/go-proto-gen.git main
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nikalexan/go-proto-gen.git ${{ steps.tag.outputs.tag }}

      - name: Index new version on proxy.golang.org
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -sf "https://proxy.golang.org/github.com/nikalexan/go-proto-gen/@v/${{ steps.tag.outputs.tag }}.info" || true
          curl -sf "https://sum.golang.org/lookup/github.com/nikalexan/go-proto-gen@${{ steps.tag.outputs.tag }}" || true