name: Generate Go from Proto

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [proto-updated]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Generated Repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone Proto Files Repository
        run: git clone https://github.com/nikalexan/go-protos.git /tmp/proto-source

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Go Code from Proto Files
        run: |
          cd /tmp/proto-source
          protoc \
            --proto_path=. \
            --go_out=$GITHUB_WORKSPACE --go_opt=paths=source_relative \
            --go-grpc_out=$GITHUB_WORKSPACE --go-grpc_opt=paths=source_relative \
            payment/payment.proto \
            order/order.proto

      - name: Commit and push generated files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "chore: regenerate pb.go from protos"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nikalexan/go-proto-gen.git main
