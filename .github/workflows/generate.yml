name: Generate Go from Proto

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Generated Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone Proto Files Repository
        run: git clone https://github.com/nikalexan/go-protos.git proto-source

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install protoc
        run: |
          PROTOC_VERSION=29.3
          curl -sSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d "$HOME/.local" bin/protoc 'include/*'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Go Code from Proto Files
        run: |
          cd proto-source
          protoc \
            --proto_path=. \
            --proto_path=$HOME/.local/include \
            --go_out=../ --go_opt=paths=source_relative \
            --go-grpc_out=../ --go-grpc_opt=paths=source_relative \
            payment/payment.proto \
            order/order.proto

      - name: Commit and push generated files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "chore: regenerate pb.go from protos"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nikalexan/go-proto-gen.git main
